// --- Utility ---
function parseCSV(text){
  const cells=[];let cur='',inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];if(ch==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(ch===','&&!inQ){cells.push(cur);cur=''}else if((ch==='\n'||ch==='\r')&&!inQ){if(ch==='\r'&&text[i+1]==='\n')i++;cells.push(cur);cur='%%NR%%'}else cur+=ch}
  cells.push(cur);const rows=[];let row=[];
  for(const c of cells){if(c.startsWith('%%NR%%')){if(row.length)rows.push(row);row=[c.replace('%%NR%%','')]}else row.push(c)}
  if(row.length)rows.push(row);if(!rows.length)return[];
  const hdr=rows[0].map(h=>h.trim().toLowerCase());
  return rows.slice(1).filter(r=>r.some(c=>c.trim())).map(r=>{const o={};hdr.forEach((h,i)=>o[h]=(r[i]||'').trim());return o});
}

function num(v){const x=parseFloat(v);return isNaN(x)?null:x}
function fmt(x,d=0){return x==null?'—':x.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d})}
function sd(v){if(!v)return '';const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function dateKey(v){if(!v)return '';const d=new Date(v);if(isNaN(d))return v.trim().toLowerCase();return d.toISOString().split('T')[0]}
function isDark(){return window.matchMedia('(prefers-color-scheme: dark)').matches}
function gridColor(){return isDark()?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)'}
function tickColor(){return '#888780'}
function destroyCharts(){charts.forEach(c=>c.destroy());charts=[]}
function destroyMap(){if(leafMap){leafMap.remove();leafMap=null}}

function getMilePos(mile){
  if(mile<=0)return WP[0];if(mile>=PCT_TOTAL)return WP[WP.length-1];
  for(let i=0;i<WP.length-1;i++){if(mile>=WP[i].m&&mile<=WP[i+1].m){const t=(mile-WP[i].m)/(WP[i+1].m-WP[i].m);return{lat:WP[i].lat+t*(WP[i+1].lat-WP[i].lat),lng:WP[i].lng+t*(WP[i+1].lng-WP[i].lng),m:mile}}}
  return WP[0];
}
function currentMile(){for(let i=mainData.length-1;i>=0;i--){const m=num(mainData[i]['end mile marker']);if(m!=null)return m}return 0}

function getEntriesMap(){
  const map={};
  for(const e of entriesData){
    // Flexibly match whatever column names exist in the entries sheet
    const d=e.date||e.day||e['entry date']||Object.values(e)[0]||'';
    const text=e.entry||e.notes||e.journal||e.text||e['journal entry']||e.entries||Object.values(e)[1]||'';
    if(d&&text) map[dateKey(d)]=text;
  }
  return map;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function dayPopup(d,dayNum,entry){
  const mile=num(d['end mile marker']);
  const enjoy=num(d['enjoyment']||d['enjoyment ']);
  const accom=num(d['accomplishment']||d['accomplishment ']);
  const diff=num(d['difficulty']||d['difficulty ']);
  const beauty=num(d['natural beauty']||d['natural beauty ']);
  const sore=num(d['soreness']);
  const injury=num(d['injury level']);
  const weather=d.weather||'';
  const high=num(d['day high temp']);
  const low=num(d['night low temp']);
  const steps=num(d.steps);
  const magic=d['trail magic']||'';
  const lonely=num(d['lonelyness']);
  const social=num(d['social interaction']||d['social interaction ']);
  const precip=d['overnight precipitation']||d['overnight precipitation ']||'';

  let h=`<div class="popup-date">Day ${dayNum} — ${sd(d.date)}</div>`;
  if(mile!=null) h+=`<div class="popup-mile">Mile ${fmt(mile)} · ${fmt(Math.round(mile/PCT_TOTAL*1000)/10,1)}% of trail</div>`;

  h+=`<div class="popup-stats">`;
  if(high!=null) h+=`<span class="lbl">High</span><span class="val">${Math.round(high)}°</span>`;
  if(low!=null) h+=`<span class="lbl">Low</span><span class="val">${Math.round(low)}°</span>`;
  if(weather) h+=`<span class="lbl">Weather</span><span class="val">${escHtml(weather)}</span>`;
  if(precip&&precip.toLowerCase()!=='no'&&precip.trim()!=='0') h+=`<span class="lbl">Precip</span><span class="val">${escHtml(precip)}</span>`;
  if(steps!=null) h+=`<span class="lbl">Steps</span><span class="val">${fmt(steps)}</span>`;
  if(magic&&magic.toLowerCase()!=='no'&&magic.trim()!=='0'&&magic.trim()!=='')
    h+=`<span class="lbl">Trail magic</span><span class="val" style="color:${C.amber}">✓</span>`;
  h+=`</div>`;

  const pills=[];
  if(enjoy!=null) pills.push({l:'Enjoy',v:enjoy,bg:'#E1F5EE',c:'#085041'});
  if(accom!=null) pills.push({l:'Accomplish',v:accom,bg:'#EAF3DE',c:'#173404'});
  if(diff!=null) pills.push({l:'Difficulty',v:diff,bg:'#FAECE7',c:'#712B13'});
  if(beauty!=null) pills.push({l:'Beauty',v:beauty,bg:'#E6F1FB',c:'#0C447C'});
  if(sore!=null) pills.push({l:'Soreness',v:sore,bg:'#FBEAF0',c:'#72243E'});
  if(injury!=null&&injury>0) pills.push({l:'Injury',v:injury,bg:'#FCEBEB',c:'#791F1F'});
  if(lonely!=null) pills.push({l:'Lonely',v:lonely,bg:'#EEEDFE',c:'#26215C'});
  if(social!=null) pills.push({l:'Social',v:social,bg:'#E1F5EE',c:'#04342C'});

  if(pills.length){
    h+=`<div class="popup-ratings">`;
    pills.forEach(p=>{h+=`<span class="popup-pill" style="background:${p.bg};color:${p.c}">${p.l} ${p.v}</span>`});
    h+=`</div>`;
  }

  if(entry) h+=`<div class="popup-entry">${escHtml(entry)}</div>`;
  return h;
}

// --- Data Loading ---
async function loadData(){
  document.getElementById('subtitle').textContent='Loading...';
  document.getElementById('content').innerHTML='';
  destroyCharts();destroyMap();

  const gids=[DATA_GID,TOWN_GID,ENTRIES_GID];
  const gviz=gids.map(g=>`https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${g}`);
  const pub=gids.map(g=>`https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${g}&single=true&output=csv`);

  let ok=false;
  for(const batch of[gviz,pub]){
    try{
      const res=await Promise.all(batch.map(u=>fetch(u)));
      const txt=await Promise.all(res.map(r=>r.text()));
      const p=parseCSV(txt[0]);
      if(!p.length)throw new Error('empty');
      mainData=p;townData=parseCSV(txt[1]);entriesData=parseCSV(txt[2]);
      ok=true;break;
    }catch(e){}
  }

  if(!ok){
    document.getElementById('subtitle').textContent='';
    document.getElementById('content').innerHTML='<div class="center-msg err">Could not load data.<br>Make sure the Google Sheet is published to web<br>(File → Share → Publish to web).</div>';
    return;
  }

  const now=new Date();
  document.getElementById('subtitle').textContent=`Updated ${now.toLocaleTimeString()} · ${mainData.length} day${mainData.length!==1?'s':''} logged`;
  renderTabs();renderTab();
}

function renderTabs(){

  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab${t.k===activeTab?' active':''}" onclick="switchTab('${t.k}')">${t.l}</button>`).join('');
}
function switchTab(k){activeTab=k;destroyCharts();destroyMap();renderTabs();renderTab()}
function renderTab(){
  const el=document.getElementById('content');el.innerHTML='';destroyCharts();destroyMap();
  ({progress:renderProgress,bodymind:renderBodyMind,stats:renderStats,weather:renderWeather,towns:renderTowns,social:renderSocial})[activeTab](el);

// PCTA official ArcGIS FeatureServer — try multiple query formats
const PCTA_URLS=[
  // Standard GeoJSON query
  'https://services5.arcgis.com/ZldHa25efPFpMmfB/ArcGIS/rest/services/PCT_Centerline/FeatureServer/0/query?where=1%3D1&outFields=OBJECTID&returnGeometry=true&geometryPrecision=4&outSR=4326&maxAllowableOffset=0.002&f=geojson',
  // Without maxAllowableOffset
  'https://services5.arcgis.com/ZldHa25efPFpMmfB/ArcGIS/rest/services/PCT_Centerline/FeatureServer/0/query?where=1%3D1&outFields=OBJECTID&returnGeometry=true&geometryPrecision=4&outSR=4326&f=geojson',
  // Try PCTA_Centerline (alt name)
  'https://services5.arcgis.com/ZldHa25efPFpMmfB/ArcGIS/rest/services/PCTA_Centerline/FeatureServer/0/query?where=1%3D1&outFields=OBJECTID&returnGeometry=true&geometryPrecision=4&outSR=4326&f=geojson',
  // Try Full_PCT
  'https://services5.arcgis.com/ZldHa25efPFpMmfB/ArcGIS/rest/services/Full_PCT/FeatureServer/0/query?where=1%3D1&outFields=OBJECTID&returnGeometry=true&geometryPrecision=4&outSR=4326&f=geojson',
  // Hosted GeoJSON from the repo itself (user can add pct-trail.geojson to their repo)
  './pct-trail.geojson',
];

let cachedTrailGeoJSON=null;

async function fetchTrailGeoJSON(){
  if(cachedTrailGeoJSON) return cachedTrailGeoJSON;
  for(const url of PCTA_URLS){
    try{
      const r=await fetch(url);
      if(!r.ok) continue;
      const gj=await r.json();
      if(gj&&gj.features&&gj.features.length>0){
        console.log('Trail loaded from:',url,'features:',gj.features.length);
        cachedTrailGeoJSON=gj;return gj;
      }
    }catch(e){continue;}
  }
  console.warn('All trail sources failed, using dense waypoint fallback');
  return null;
}

// Extract all coords from GeoJSON as flat [lat,lng] array for distance calcs
function getAllTrailCoords(gj){
  const coords=[];
  for(const f of gj.features){
    const g=f.geometry;
    if(g.type==='LineString') g.coordinates.forEach(c=>coords.push([c[1],c[0]]));
    else if(g.type==='MultiLineString') g.coordinates.forEach(ls=>ls.forEach(c=>coords.push([c[1],c[0]])));
  }
  return coords;
}

// Find the closest point on the real trail coords to a waypoint-estimated position
function findClosestTrailPoint(trailCoords,lat,lng){
  let best=0,bestD=Infinity;
  for(let i=0;i<trailCoords.length;i++){
    const d=(trailCoords[i][0]-lat)**2+(trailCoords[i][1]-lng)**2;
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

function drawLeafletMap(mile){
  const dk=isDark();
  const tileUrl=dk
    ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

  leafMap=L.map('leaflet-map',{scrollWheelZoom:true}).setView([40.5,-120.5],5);
  L.tileLayer(tileUrl,{
    attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> · Trail data: <a href="https://www.pcta.org/discover-the-trail/maps/pct-data/">PCTA</a> (CC-BY-4.0)',
    subdomains:'abcd',maxZoom:16
  }).addTo(leafMap);

  // Fetch real trail, then render everything
  fetchTrailGeoJSON().then(gj=>{
    // Build coord array and snapping function
    const allCoords=gj?getAllTrailCoords(gj):null;
    const startIdx=allCoords?findClosestTrailPoint(allCoords,32.59,-116.47):0;

    let cumDist=null;
    if(allCoords&&allCoords.length>1){
      cumDist=[0];
      for(let i=1;i<allCoords.length;i++){
        const dlat=allCoords[i][0]-allCoords[i-1][0];
        const dlng=allCoords[i][1]-allCoords[i-1][1];
        cumDist.push(cumDist[i-1]+Math.sqrt(dlat*dlat+dlng*dlng));
      }
    }

    function snapToTrail(m){
      if(!allCoords||!cumDist) return getMilePos(m);
      const frac=Math.max(0,Math.min(1,m/PCT_TOTAL));
      const endIdx=allCoords.length-1;
      const lo=Math.min(startIdx,endIdx),hi=Math.max(startIdx,endIdx);
      const totalLen=cumDist[hi]-cumDist[lo];
      const targetDist=cumDist[lo]+frac*totalLen;
      let a=lo,b=hi;
      while(b-a>1){const mid=(a+b)>>1;if(cumDist[mid]<targetDist)a=mid;else b=mid;}
      const segLen=cumDist[b]-cumDist[a];
      const t=segLen>0?(targetDist-cumDist[a])/segLen:0;
      return {
        lat:allCoords[a][0]+t*(allCoords[b][0]-allCoords[a][0]),
        lng:allCoords[a][1]+t*(allCoords[b][1]-allCoords[a][1])
      };
    }

    // Also return the trail coord index for a given mile (for slicing the hiked portion)
    function mileToIdx(m){
      if(!allCoords||!cumDist) return -1;
      const frac=Math.max(0,Math.min(1,m/PCT_TOTAL));
      const endIdx=allCoords.length-1;
      const lo=Math.min(startIdx,endIdx),hi=Math.max(startIdx,endIdx);
      const totalLen=cumDist[hi]-cumDist[lo];
      const targetDist=cumDist[lo]+frac*totalLen;
      let a=lo,b=hi;
      while(b-a>1){const mid=(a+b)>>1;if(cumDist[mid]<targetDist)a=mid;else b=mid;}
      return b;
    }

    if(gj){
      // Full trail — gray dashed
      L.geoJSON(gj,{style:{color:C.grayLt,weight:3,opacity:.4,dashArray:'8 6'}}).addTo(leafMap);
      // Hiked portion — solid teal, sliced from real coords
      if(mile>0){
        const curIdx=mileToIdx(mile);
        if(curIdx>startIdx){
          const hikedCoords=allCoords.slice(Math.min(startIdx,curIdx),Math.max(startIdx,curIdx)+1);
          if(hikedCoords.length>1) L.polyline(hikedCoords,{color:C.teal,weight:4,opacity:.9}).addTo(leafMap);
        }
      }
    } else {
      // Fallback waypoints
      L.polyline(WP.map(w=>[w.lat,w.lng]),{color:C.grayLt,weight:3,opacity:.45,dashArray:'8 6'}).addTo(leafMap);
      if(mile>0){
        const hw=WP.filter(w=>w.m<=mile);const cp=getMilePos(mile);hw.push({lat:cp.lat,lng:cp.lng});
        L.polyline(hw.map(w=>[w.lat,w.lng]),{color:C.teal,weight:4,opacity:.9}).addTo(leafMap);
      }
    }

    // Landmarks — snapped to trail
    LANDMARKS.forEach(lm=>{
      const p=snapToTrail(lm.m);const isH=lm.m<=mile;
      L.circleMarker([p.lat,p.lng],{radius:4,fillColor:isH?C.teal:C.grayLt,fillOpacity:.8,color:'white',weight:1}).addTo(leafMap)
       .bindTooltip(lm.l,{permanent:false,direction:'right',offset:[8,0]});
    });

    // Day camp markers — snapped to trail
    const entriesMap=getEntriesMap();
    mainData.forEach((d,i)=>{
      const m=num(d['end mile marker']);if(m==null)return;
      const pos=snapToTrail(m);
      const entry=entriesMap[dateKey(d.date)]||'';
      const marker=L.circleMarker([pos.lat,pos.lng],{radius:7,fillColor:C.purple,fillOpacity:.85,color:'white',weight:2}).addTo(leafMap);
      marker.bindPopup(dayPopup(d,i+1,entry),{maxWidth:300,minWidth:220});
      marker.bindTooltip(`Day ${i+1}: ${sd(d.date)} — mi ${fmt(m)}`,{direction:'top',offset:[0,-10]});
    });

    // Current position — snapped to trail
    if(mile>0){
      const cur=snapToTrail(mile);
      L.circleMarker([cur.lat,cur.lng],{radius:14,fillColor:C.coral,fillOpacity:.15,color:C.coral,weight:2,opacity:.5}).addTo(leafMap);
      L.circleMarker([cur.lat,cur.lng],{radius:7,fillColor:C.coral,fillOpacity:1,color:'white',weight:2.5}).addTo(leafMap)
       .bindTooltip(`Current: mile ${fmt(mile)}`,{direction:'top',offset:[0,-12]});
      const bounds=L.latLngBounds([[32.59,-116.47],[cur.lat,cur.lng]]);
      leafMap.fitBounds(bounds.pad(0.2));
    }
  });
}

// --- Body & Mind ---
function renderBodyMind(el){
  const GOOD=[
    {k:'enjoyment',l:'Enjoyment',c:C.teal},{k:'accomplishment',l:'Accomplishment',c:C.green},
    {k:'natural beauty',l:'Beauty',c:C.blue},{k:'social interaction',l:'Social',c:C.tealLt},
  ];
  const WATCH=[
    {k:'difficulty',l:'Difficulty',c:C.coral},{k:'hunger level',l:'Hunger',c:C.amber},
    {k:'soreness',l:'Soreness',c:C.pink},{k:'injury level',l:'Injury',c:C.red},
    {k:'lonelyness',l:'Loneliness',c:C.purple},
  ];
  const ALL=[...GOOD,...WATCH];

  const cData=mainData.map(d=>{
    const o={date:sd(d.date)};
    ALL.forEach(f=>{
      // Handle trailing spaces in column names
      o[f.l]=num(d[f.k])||num(d[f.k+' ']);
    });
    return o;
  }).filter(d=>ALL.some(f=>d[f.l]!=null));

  const last=cData[cData.length-1];
  const avgs=ALL.map(f=>{const v=cData.map(d=>d[f.l]).filter(x=>x!=null);return{...f,avg:v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:0,vals:v}});

  // Build sparkline SVGs inline
  function sparkSvg(vals,color){
    if(vals.length<2) return '';
    const w=60,h=18,pad=1;
    const mn=0,mx=10;
    const pts=vals.map((v,i)=>{
      const x=pad+(i/(vals.length-1))*(w-2*pad);
      const y=h-pad-((v-mn)/(mx-mn))*(h-2*pad);
      return`${x},${y}`;
    }).join(' ');
    return`<svg width="${w}" height="${h}" style="vertical-align:middle;margin-left:6px"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  }

  function barRow(f,val,avg,vals,isWatch){
    const pctVal=val!=null?(val/10*100):0;
    const pctAvg=avg>0?(avg/10*100):0;
    const barBg=isWatch?'var(--bd2)':'var(--bd2)';
    const valDisplay=val!=null?val:'—';
    return`<div style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:.78rem;color:var(--tx2);display:flex;align-items:center;gap:4px">
          <span style="width:8px;height:8px;border-radius:2px;background:${f.c};display:inline-block"></span>${f.l}
        </span>
        <span style="font-size:.78rem;display:flex;align-items:center">
          <span style="font-weight:500;color:var(--tx)">${valDisplay}</span>
          <span style="color:var(--tx3);margin-left:6px">avg ${avg}</span>
          ${sparkSvg(vals,f.c)}
        </span>
      </div>
      <div style="height:6px;border-radius:3px;background:${barBg};position:relative;overflow:visible">
        ${val!=null?`<div style="height:100%;width:${pctVal}%;border-radius:3px;background:${f.c};opacity:.7;transition:width .4s"></div>`:''}
        ${avg>0?`<div style="position:absolute;left:${pctAvg}%;top:-2px;width:2px;height:10px;background:var(--tx3);border-radius:1px" title="Trip avg: ${avg}"></div>`:''}
      </div>
    </div>`;
  }

  el.innerHTML=`
    <div class="section">Latest day${last?` — ${last.date}`:''}</div>
    <div style="margin-bottom:6px;font-size:.72rem;color:var(--tx3)">Bar = today's value · Tick mark = trip average · Sparkline = trend</div>
    <div style="margin-bottom:20px">
      <div style="font-size:.72rem;font-weight:500;color:${C.teal};text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Good vibes</div>
      ${avgs.filter(a=>GOOD.some(g=>g.k===a.k)).map(a=>barRow(a,last?last[a.l]:null,a.avg,a.vals,false)).join('')}
      <div style="font-size:.72rem;font-weight:500;color:${C.coral};text-transform:uppercase;letter-spacing:.04em;margin:14px 0 8px">Watch list</div>
      ${avgs.filter(a=>WATCH.some(w=>w.k===a.k)).map(a=>barRow(a,last?last[a.l]:null,a.avg,a.vals,true)).join('')}
    </div>
    <div class="chart-label">Trends over time <span style="font-size:.68rem;color:var(--tx3);font-weight:400">— click a metric to highlight</span></div>
    <div id="bm-legend" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
    <div class="chart-wrap" style="height:300px"><canvas id="ch-trends"></canvas></div>`;

  // Build interactive chart with clickable legend
  if(cData.length){
    const datasets=ALL.map(f=>({
      label:f.l,data:cData.map(d=>d[f.l]),borderColor:f.c,
      borderWidth:2,pointRadius:0,tension:.3,spanGaps:true,
    }));

    const trendsChart=new Chart(document.getElementById('ch-trends'),{
      type:'line',
      data:{labels:cData.map(d=>d.date),datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},
          y:{min:0,max:10,ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}},
        interaction:{mode:'index',intersect:false},
      }
    });
    charts.push(trendsChart);

    // Clickable legend
    const legendEl=document.getElementById('bm-legend');
    let activeIdx=null;

    function renderLegend(){
      legendEl.innerHTML=ALL.map((f,i)=>{
        const isActive=activeIdx===null||activeIdx===i;
        const opacity=isActive?1:0.25;
        return`<button onclick="window._bmToggle(${i})" style="
          display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;
          border:1px solid ${isActive?f.c:'var(--bd2)'};cursor:pointer;font-family:var(--font);
          font-size:.72rem;background:${activeIdx===i?f.c+'18':'transparent'};
          color:${isActive?'var(--tx)':'var(--tx3)'};opacity:${opacity};transition:.15s;
          font-weight:${activeIdx===i?'500':'400'};
        "><span style="width:8px;height:8px;border-radius:50%;background:${f.c};display:inline-block"></span>${f.l}</button>`;
      }).join('');
    }

    window._bmToggle=function(idx){
      if(activeIdx===idx) activeIdx=null; else activeIdx=idx;
      trendsChart.data.datasets.forEach((ds,i)=>{
        if(activeIdx===null){
          ds.borderWidth=2;ds.borderColor=ALL[i].c;ds.pointRadius=0;
        } else if(i===activeIdx){
          ds.borderWidth=3;ds.borderColor=ALL[i].c;ds.pointRadius=3;
        } else {
          ds.borderWidth=1;ds.borderColor=ALL[i].c+'30';ds.pointRadius=0;
        }
      });
      trendsChart.update();
      renderLegend();
    };
    renderLegend();
  }
}

// --- Stats ---
function parseTime(str){
  // Parse time strings like "6:30", "6:30 AM", "18:30", "6:30am"
  if(!str) return null;
  str=str.trim().toLowerCase().replace(/\s+/g,'');
  let m=str.match(/^(\d{1,2}):?(\d{2})?\s*(am|pm)?$/);
  if(!m) return null;
  let h=parseInt(m[1]),min=parseInt(m[2]||'0');
  if(m[3]==='pm'&&h<12) h+=12;
  if(m[3]==='am'&&h===12) h=0;
  if(h>23||min>59) return null;
  return h+min/60; // decimal hours
}

function fmtTime(dec){
  if(dec==null) return '—';
  let h=Math.floor(dec),m=Math.round((dec-h)*60);
  if(m===60){h++;m=0;}
  const ampm=h>=12?'PM':'AM';
  const h12=h===0?12:h>12?h-12:h;
  return `${h12}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function renderStats(el){
  const cData=mainData.map((d,i)=>{
    const prevMile=i>0?num(mainData[i-1]['end mile marker'])||0:0;
    const curMile=num(d['end mile marker'])||0;
    const steps=num(d.steps);
    const waters=num(d['waters crossed']);
    const breaks=num(d['number of major breaks']);
    const startTime=parseTime(d['hiking start time']||'');
    const stopTime=parseTime(d['hiking stop time']||'');
    const wakeTime=parseTime(d['wake up']||d['wake up ']||'');
    const bedtime=parseTime(d['sleep time']||''); // when he fell asleep
    const hunger=num(d['hunger level']);
    const lodging=d.lodging||'';
    // Use his actual logged sleep hours column (not calculated)
    const sleepHours=num(d['sleep hours'])||num(d['sleep hours '])||null;
    const sleepScore=num(d['sleep score'])||num(d['sleep score '])||null;
    // Hiking hours
    let hikingHours=null;
    if(startTime!=null&&stopTime!=null&&stopTime>startTime) hikingHours=Math.round((stopTime-startTime)*10)/10;
    return{date:sd(d.date),daily:Math.max(0,Math.round((curMile-prevMile)*10)/10),steps,waters,breaks,
      startTime,stopTime,wakeTime,bedtime,hikingHours,sleepHours,sleepScore,hunger,lodging,
      startRaw:d['hiking start time']||'',stopRaw:d['hiking stop time']||'',
      wakeRaw:d['wake up']||d['wake up ']||'',bedtimeRaw:d['sleep time']||''};
  });

  const totalSteps=cData.reduce((s,d)=>s+(d.steps||0),0);
  const totalWaters=cData.reduce((s,d)=>s+(d.waters||0),0);
  const daysWithSteps=cData.filter(d=>d.steps!=null);
  const avgSteps=daysWithSteps.length?Math.round(totalSteps/daysWithSteps.length):0;
  const daysWithHunger=cData.map(d=>d.hunger).filter(x=>x!=null);
  const avgHunger=daysWithHunger.length?Math.round(daysWithHunger.reduce((a,b)=>a+b,0)/daysWithHunger.length*10)/10:0;

  const daysWithHiking=cData.filter(d=>d.hikingHours!=null);
  const avgHiking=daysWithHiking.length?Math.round(daysWithHiking.reduce((s,d)=>s+d.hikingHours,0)/daysWithHiking.length*10)/10:null;
  const daysWithSleep=cData.filter(d=>d.sleepHours!=null);
  const avgSleep=daysWithSleep.length?Math.round(daysWithSleep.reduce((s,d)=>s+d.sleepHours,0)/daysWithSleep.length*10)/10:null;
  const daysWithScore=cData.filter(d=>d.sleepScore!=null);
  const avgScore=daysWithScore.length?Math.round(daysWithScore.reduce((s,d)=>s+d.sleepScore,0)/daysWithScore.length*10)/10:null;
  const avgWake=cData.filter(d=>d.wakeTime!=null);
  const avgWakeTime=avgWake.length?avgWake.reduce((s,d)=>s+d.wakeTime,0)/avgWake.length:null;
  const avgBedtimeArr=cData.filter(d=>d.bedtime!=null);
  // Bedtime averaging: normalize around midnight (add 24 to PM times for correct avg)
  let avgBedtime=null;
  if(avgBedtimeArr.length){
    const normalized=avgBedtimeArr.map(d=>d.bedtime<12?d.bedtime+24:d.bedtime);
    const raw=normalized.reduce((s,v)=>s+v,0)/normalized.length;
    avgBedtime=raw>=24?raw-24:raw;
  }

  // Steps per mile
  const stepsPerMile=daysWithSteps.filter(d=>d.daily>0).map(d=>({date:d.date,spm:Math.round((d.steps||0)/d.daily)}));

  // Lodging breakdown
  const lodgingCounts={};
  cData.forEach(d=>{if(d.lodging){const k=d.lodging.toLowerCase().trim();lodgingCounts[k]=(lodgingCounts[k]||0)+1;}});
  const lodgingEntries=Object.entries(lodgingCounts).sort((a,b)=>b[1]-a[1]);

  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total steps</div><div class="metric-val" style="color:${C.teal}">${totalSteps>0?fmt(totalSteps):'—'}</div></div>
      <div class="metric"><div class="metric-label">Avg steps/day</div><div class="metric-val" style="color:${C.blue}">${avgSteps>0?fmt(avgSteps):'—'}</div></div>
      <div class="metric"><div class="metric-label">Water crossings</div><div class="metric-val" style="color:${C.purple}">${totalWaters>0?fmt(totalWaters):'—'}</div></div>
      <div class="metric"><div class="metric-label">Avg hunger</div><div class="metric-val" style="color:${C.amber}">${avgHunger>0?avgHunger+'/10':'—'}</div></div>
    </div>

    <div class="section">Sleep & schedule</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Avg bedtime</div><div class="metric-val" style="color:${C.purple};font-size:1.1rem">${fmtTime(avgBedtime)}</div></div>
      <div class="metric"><div class="metric-label">Avg wake up</div><div class="metric-val" style="color:${C.amber};font-size:1.1rem">${fmtTime(avgWakeTime)}</div></div>
      <div class="metric"><div class="metric-label">Avg sleep</div><div class="metric-val" style="color:${C.blue}">${avgSleep!=null?avgSleep+'h':'—'}</div></div>
      ${daysWithScore.length?`<div class="metric"><div class="metric-label">Avg sleep score</div><div class="metric-val" style="color:${C.green}">${avgScore!=null?avgScore+'/10':'—'}</div></div>`
      :`<div class="metric"><div class="metric-label">Avg hiking</div><div class="metric-val" style="color:${C.teal}">${avgHiking!=null?avgHiking+'h':'—'}</div></div>`}
    </div>

    ${daysWithSleep.length>1||daysWithScore.length>1?`
    <div class="chart-label">Sleep tracking</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch-sleep"></canvas></div>
    <div class="legend">
      <span><span class="leg-sq" style="background:${C.blue}"></span>Sleep hours</span>
      ${daysWithScore.length?`<span><span class="leg-ln" style="background:${C.green}"></span>Sleep score</span>`:''}
    </div>`:''}

    ${daysWithHiking.length>1?`
    <div class="chart-label">Hiking hours per day</div>
    <div class="chart-wrap" style="height:180px"><canvas id="ch-hiking"></canvas></div>`:''}

    <div class="chart-label">Daily steps</div>
    <div class="chart-wrap" style="height:200px"><canvas id="ch-steps"></canvas></div>
    <div class="chart-label">Hunger level over time</div>
    <div class="chart-wrap" style="height:180px"><canvas id="ch-hunger"></canvas></div>
    ${stepsPerMile.length>1?`<div class="chart-label">Steps per mile (effort/terrain)</div><div class="chart-wrap" style="height:180px"><canvas id="ch-spm"></canvas></div>`:''}

    ${lodgingEntries.length?`<div class="section">Lodging breakdown</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
      ${lodgingEntries.map(([k,v])=>`<div class="avg-pill"><span style="font-weight:500">${v}</span><span style="color:var(--tx2)">${k}</span></div>`).join('')}
    </div>`:''}

    <div class="section">Daily log</div>
    ${cData.slice().reverse().slice(0,14).map(d=>`<div class="log-row" style="flex-wrap:wrap;gap:6px">
      <span class="date">${d.date}</span>
      ${d.daily>0?`<span style="color:${C.teal};font-weight:500">${d.daily} mi</span>`:''}
      ${d.steps!=null?`<span style="color:var(--tx2)">${fmt(d.steps)} steps</span>`:''}
      ${d.hikingHours!=null?`<span style="color:${C.teal}">${d.hikingHours}h hiking</span>`:''}
      ${d.sleepHours!=null?`<span style="color:${C.blue}">${d.sleepHours}h sleep</span>`:''}
      ${d.sleepScore!=null?`<span style="color:${C.green}">score ${d.sleepScore}</span>`:''}
      ${d.bedtimeRaw?`<span style="color:${C.purple}">🌙 ${escHtml(d.bedtimeRaw)}</span>`:''}
      ${d.wakeRaw?`<span style="color:${C.amber}">🌅 ${escHtml(d.wakeRaw)}</span>`:''}
      ${d.waters!=null&&d.waters>0?`<span style="color:${C.blue}">${d.waters} water</span>`:''}
      ${d.breaks!=null?`<span style="color:var(--tx3)">${d.breaks} breaks</span>`:''}
      ${d.hunger!=null?`<span style="color:${C.amber}">hunger ${d.hunger}</span>`:''}
      ${d.lodging?`<span style="color:var(--tx3)">${escHtml(d.lodging)}</span>`:''}
    </div>`).join('')}`;

  // Sleep chart — hours as bars, score as line overlay
  const sleepData=cData.filter(d=>d.sleepHours!=null||d.sleepScore!=null);
  if(sleepData.length>1&&document.getElementById('ch-sleep')){
    const datasets=[
      {type:'bar',label:'Sleep hours',data:sleepData.map(d=>d.sleepHours),backgroundColor:C.blue,borderRadius:4,yAxisID:'y',order:2},
    ];
    const scales={
      x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},
      y:{position:'left',ticks:{font:{size:10},color:tickColor(),callback:v=>v+'h'},grid:{color:gridColor()},title:{display:true,text:'Hours',font:{size:10},color:tickColor()}},
    };
    if(daysWithScore.length){
      datasets.push({type:'line',label:'Sleep score',data:sleepData.map(d=>d.sleepScore),borderColor:C.green,borderWidth:2,pointRadius:2,tension:.3,spanGaps:true,yAxisID:'y1',order:1});
      scales.y1={position:'right',min:0,max:10,ticks:{font:{size:10},color:tickColor()},grid:{display:false},title:{display:true,text:'Score',font:{size:10},color:tickColor()}};
    }
    charts.push(new Chart(document.getElementById('ch-sleep'),{type:'bar',data:{labels:sleepData.map(d=>d.date),datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales}}));
  }

  // Hiking hours chart
  const hikingData=cData.filter(d=>d.hikingHours!=null);
  if(hikingData.length>1&&document.getElementById('ch-hiking')){
    charts.push(new Chart(document.getElementById('ch-hiking'),{type:'bar',data:{labels:hikingData.map(d=>d.date),datasets:[{label:'Hiking hours',data:hikingData.map(d=>d.hikingHours),backgroundColor:C.teal,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor(),callback:v=>v+'h'},grid:{color:gridColor()}}}}}));
  }

  const stepsData=cData.filter(d=>d.steps!=null);
  if(stepsData.length){
    charts.push(new Chart(document.getElementById('ch-steps'),{type:'bar',data:{labels:stepsData.map(d=>d.date),datasets:[{label:'Steps',data:stepsData.map(d=>d.steps),backgroundColor:C.teal,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}}}}));
  }

  const hungerData=cData.filter(d=>d.hunger!=null);
  if(hungerData.length){
    charts.push(new Chart(document.getElementById('ch-hunger'),{type:'line',data:{labels:hungerData.map(d=>d.date),datasets:[{label:'Hunger',data:hungerData.map(d=>d.hunger),borderColor:C.amber,backgroundColor:C.amberBg+'80',fill:true,tension:.3,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{min:0,max:10,ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}}}}));
  }

  if(stepsPerMile.length>1){
    charts.push(new Chart(document.getElementById('ch-spm'),{type:'line',data:{labels:stepsPerMile.map(d=>d.date),datasets:[{label:'Steps/mile',data:stepsPerMile.map(d=>d.spm),borderColor:C.green,borderWidth:2,tension:.3,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}}}}));
  }
}

}

// --- Towns ---
function renderTowns(el){
  if(!townData.length){el.innerHTML='<div class="center-msg">No town data yet</div>';return}
  const towns=townData.map(t=>({
    name:t['town name']||'Unknown',entered:t['date entered town'],left:t['date left town'],
    mile:num(t['left the trail at mile marker'])||num(t['left the trail at mile marker ']),
    grocery:num(t['grocery bill']),meals:num(t['# meals at restaurant']),
    restaurant:t['restruant name(s)']||t['restaurant name(s)']||'',
    charged:t['charged']||t['charged ']||'',
    distance:t['distance from trail to town']||'',
    foodRating:num(t['food rating'])||num(t['food rating '])||null,
    townRating:num(t['town rating'])||num(t['town rating '])||num(t['rating'])||num(t['rating '])||null,
  }));
  const totalG=towns.reduce((s,t)=>s+(t.grocery||0),0),totalM=towns.reduce((s,t)=>s+(t.meals||0),0);
  const totalFood=totalG+totalM*15;
  const spend=towns.filter(t=>t.grocery!=null||t.meals!=null);

  // Detect which rating columns exist
  const hasFoodRatings=towns.some(t=>t.foodRating!=null);
  const hasTownRatings=towns.some(t=>t.townRating!=null);
  const foodRated=towns.filter(t=>t.foodRating!=null);
  const townRated=towns.filter(t=>t.townRating!=null);
  const avgFood=foodRated.length?Math.round(foodRated.reduce((s,t)=>s+t.foodRating,0)/foodRated.length*10)/10:null;
  const avgTown=townRated.length?Math.round(townRated.reduce((s,t)=>s+t.townRating,0)/townRated.length*10)/10:null;
  const bestFood=foodRated.length?foodRated.reduce((a,b)=>b.foodRating>a.foodRating?b:a):null;
  const bestTown=townRated.length?townRated.reduce((a,b)=>b.townRating>a.townRating?b:a):null;

  // Rating bar helper
  function ratingBar(val,max,color,label){
    if(val==null) return '';
    const pct=Math.round(val/max*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      ${label?`<span style="font-size:.68rem;color:var(--tx3);min-width:36px">${label}</span>`:''}
      <div style="flex:1;height:6px;border-radius:3px;background:var(--bd2);overflow:hidden">
        <div style="height:100%;width:${pct}%;border-radius:3px;background:${color}"></div>
      </div>
      <span style="font-size:.78rem;font-weight:500;color:${color};min-width:28px">${val}/10</span>
    </div>`;
  }

  function ratingColor(val){
    if(val>=8) return C.teal;
    if(val>=6) return C.amber;
    if(val>=4) return C.coral;
    return C.red;
  }

  // Trophy banners
  let trophyHtml='';
  if(bestFood||bestTown){
    trophyHtml+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">';
    if(bestFood) trophyHtml+=`<div style="flex:1;min-width:200px;background:${C.coralBg};border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:1.4rem">🍽️</span>
      <div>
        <div style="font-size:.68rem;color:${C.coral};font-weight:500;text-transform:uppercase;letter-spacing:.04em">Best food</div>
        <div style="font-size:.92rem;font-weight:500">${escHtml(bestFood.name)} — ${bestFood.foodRating}/10</div>
        ${bestFood.restaurant?`<div style="font-size:.72rem;color:var(--tx2)">${escHtml(bestFood.restaurant)}</div>`:''}
      </div>
    </div>`;
    if(bestTown) trophyHtml+=`<div style="flex:1;min-width:200px;background:${C.purpleBg};border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:1.4rem">🏆</span>
      <div>
        <div style="font-size:.68rem;color:${C.purple};font-weight:500;text-transform:uppercase;letter-spacing:.04em">Best town</div>
        <div style="font-size:.92rem;font-weight:500">${escHtml(bestTown.name)} — ${bestTown.townRating}/10</div>
      </div>
    </div>`;
    trophyHtml+='</div>';
  }

  // Chart section — side by side if both exist
  const hasAnyRatings=foodRated.length>1||townRated.length>1;
  let chartHtml='';
  if(hasFoodRatings&&hasTownRatings&&foodRated.length>1&&townRated.length>1){
    // Combined chart with both ratings
    const allRated=towns.filter(t=>t.foodRating!=null||t.townRating!=null);
    chartHtml=`<div class="chart-label">Town & food ratings</div>
      <div class="chart-wrap" style="height:${Math.max(160,allRated.length*42+50)}px"><canvas id="ch-ratings"></canvas></div>
      <div class="legend"><span><span class="leg-sq" style="background:${C.coral}"></span>Food</span><span><span class="leg-sq" style="background:${C.purple}"></span>Town</span></div>`;
  } else if(foodRated.length>1){
    chartHtml=`<div class="chart-label">Food ratings by town</div>
      <div class="chart-wrap" style="height:${Math.max(140,foodRated.length*38+50)}px"><canvas id="ch-ratings"></canvas></div>`;
  } else if(townRated.length>1){
    chartHtml=`<div class="chart-label">Town ratings</div>
      <div class="chart-wrap" style="height:${Math.max(140,townRated.length*38+50)}px"><canvas id="ch-ratings"></canvas></div>`;
  }

  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Towns visited</div><div class="metric-val" style="color:${C.purple}">${towns.length}</div></div>
      ${hasTownRatings?`<div class="metric"><div class="metric-label">Avg town rating</div><div class="metric-val" style="color:${C.purple}">${avgTown!=null?avgTown+'/10':'—'}</div></div>`:''}
      ${hasFoodRatings?`<div class="metric"><div class="metric-label">Avg food rating</div><div class="metric-val" style="color:${C.coral}">${avgFood!=null?avgFood+'/10':'—'}</div></div>`:''}
      <div class="metric"><div class="metric-label">Grocery spending</div><div class="metric-val" style="color:${C.teal}">$${fmt(totalG)}</div></div>
      <div class="metric"><div class="metric-label">Est. total food</div><div class="metric-val" style="color:${C.amber}">$${fmt(totalFood)}</div><div class="metric-sub">${totalM} meals out</div></div>
    </div>
    ${trophyHtml}
    ${chartHtml}
    ${spend.length?`<div class="chart-label">Spending by town</div><div class="chart-wrap" style="height:${Math.max(160,spend.length*42+50)}px"><canvas id="ch-spend"></canvas></div><div class="legend"><span><span class="leg-sq" style="background:${C.teal}"></span>Groceries</span><span><span class="leg-sq" style="background:${C.coral}"></span>Est. dining (~$15/meal)</span></div>`:''}
    <div class="section">Town details</div>
    ${towns.map(t=>{
      const det=[t.entered&&`In: ${sd(t.entered)}`,t.left&&`Out: ${sd(t.left)}`,t.grocery&&`Grocery: $${fmt(t.grocery)}`,t.meals&&`${t.meals} meal${t.meals>1?'s':''} out`,t.distance&&`${t.distance} from trail`,t.charged&&t.charged.toLowerCase()!=='no'&&t.charged.trim()!=='0'&&t.charged.trim()!==''?'Charged devices':null].filter(Boolean).join('  ·  ');
      const showBoth=hasFoodRatings&&hasTownRatings;
      return`<div class="town-card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="town-name">${escHtml(t.name)}</span>
          ${t.mile?`<span class="town-mile">mi ${fmt(t.mile)}</span>`:''}
        </div>
        ${det?`<div class="town-detail">${det}</div>`:''}
        ${t.restaurant?`<div style="font-size:.82rem;color:${C.coral};margin-top:3px">${escHtml(t.restaurant)}</div>`:''}
        ${ratingBar(t.townRating,10,C.purple,showBoth?'Town':'')}
        ${ratingBar(t.foodRating,10,C.coral,showBoth?'Food':'')}
      </div>`}).join('')}`;

  // Ratings chart
  if(document.getElementById('ch-ratings')){
    if(hasFoodRatings&&hasTownRatings){
      const allRated=towns.filter(t=>t.foodRating!=null||t.townRating!=null);
      charts.push(new Chart(document.getElementById('ch-ratings'),{type:'bar',data:{
        labels:allRated.map(t=>t.name),
        datasets:[
          {label:'Food',data:allRated.map(t=>t.foodRating),backgroundColor:C.coral,borderRadius:4},
          {label:'Town',data:allRated.map(t=>t.townRating),backgroundColor:C.purple,borderRadius:4},
        ]
      },options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
        scales:{x:{min:0,max:10,ticks:{font:{size:10},color:tickColor(),stepSize:2},grid:{color:gridColor()}},
          y:{ticks:{font:{size:11},color:tickColor()},grid:{display:false}}}}}));
    } else {
      const rated=foodRated.length?foodRated:townRated;
      const key=foodRated.length?'foodRating':'townRating';
      const label=foodRated.length?'Food rating':'Town rating';
      charts.push(new Chart(document.getElementById('ch-ratings'),{type:'bar',data:{
        labels:rated.map(t=>t.name),
        datasets:[{label,data:rated.map(t=>t[key]),backgroundColor:rated.map(t=>ratingColor(t[key])),borderRadius:4}]
      },options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
        scales:{x:{min:0,max:10,ticks:{font:{size:10},color:tickColor(),stepSize:2},grid:{color:gridColor()}},
          y:{ticks:{font:{size:11},color:tickColor()},grid:{display:false}}}}}));
    }
  }

  if(spend.length){charts.push(new Chart(document.getElementById('ch-spend'),{type:'bar',data:{labels:spend.map(t=>t.name),datasets:[{label:'Groceries',data:spend.map(t=>t.grocery||0),backgroundColor:C.teal},{label:'Est. dining',data:spend.map(t=>(t.meals||0)*15),backgroundColor:C.coral}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{font:{size:10},color:tickColor(),callback:v=>'$'+v},grid:{color:gridColor()}},y:{stacked:true,ticks:{font:{size:11},color:tickColor()},grid:{display:false}}}}}));}
}

// --- Social ---
function renderSocial(el){
  const cData=mainData.map(d=>({date:sd(d.date),people:num(d['number of people at camp']),social:num(d['social interaction'])||num(d['social interaction ']),lonely:num(d['lonelyness']),pctAlone:num(d['percent hiked alone'])})).filter(d=>d.people!=null||d.social!=null||d.lonely!=null);

  // Trail magic log
  const magicDays=mainData.filter(d=>d['trail magic']&&d['trail magic'].toLowerCase()!=='no'&&d['trail magic'].trim()!=='0'&&d['trail magic'].trim()!=='');
  const avgP=(()=>{const v=cData.map(d=>d.people).filter(x=>x!=null);return v.length?fmt(v.reduce((a,b)=>a+b,0)/v.length,1):'—'})();
  const avgSocial=(()=>{const v=cData.map(d=>d.social).filter(x=>x!=null);return v.length?fmt(v.reduce((a,b)=>a+b,0)/v.length,1):'—'})();
  const avgLonely=(()=>{const v=cData.map(d=>d.lonely).filter(x=>x!=null);return v.length?fmt(v.reduce((a,b)=>a+b,0)/v.length,1):'—'})();

  // Max people for chart scale
  const maxPeople=Math.max(10,...cData.map(d=>d.people||0).filter(x=>x!=null));

  // Trail magic details
  let magicHtml='';
  if(magicDays.length){
    magicHtml=`<div class="section">Trail magic log</div>${magicDays.map(d=>{
      const tm=d['trail magic'];
      const mi=num(d['end mile marker']);
      return `<div class="town-card"><div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-weight:500;font-size:.88rem">${sd(d.date)}</span>${mi!=null?`<span class="town-mile">mi ${fmt(mi)}</span>`:''}</div><div class="town-detail" style="color:${C.amber}">${escHtml(typeof tm==='string'?tm:'Trail magic!')}</div></div>`;
    }).join('')}`;
  }

  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Trail magic days</div><div class="metric-val" style="color:${C.amber}">${magicDays.length}</div></div>
      <div class="metric"><div class="metric-label">Avg people at camp</div><div class="metric-val" style="color:${C.purple}">${avgP}</div></div>
      <div class="metric"><div class="metric-label">Avg social</div><div class="metric-val" style="color:${C.teal}">${avgSocial}</div><div class="metric-sub">out of 10</div></div>
      <div class="metric"><div class="metric-label">Avg loneliness</div><div class="metric-val" style="color:${C.purple}">${avgLonely}</div><div class="metric-sub">out of 10</div></div>
    </div>
    <div class="chart-label">Social interaction vs loneliness</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch-soc1"></canvas></div>
    <div class="legend"><span><span class="leg-ln" style="background:${C.teal}"></span>Social interaction</span><span><span class="leg-ln" style="background:${C.purple}"></span>Loneliness</span></div>
    <div class="chart-label">People at camp & % hiked alone</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch-soc2"></canvas></div>
    <div class="legend"><span><span class="leg-sq" style="background:${C.purpleLt}"></span>People at camp</span><span><span class="leg-ln" style="background:${C.gray}"></span>% hiked alone</span></div>
    ${magicHtml}`;

  // Social vs lonely on same 0-10 scale
  charts.push(new Chart(document.getElementById('ch-soc1'),{type:'line',data:{labels:cData.map(d=>d.date),datasets:[
    {label:'Social interaction',data:cData.map(d=>d.social),borderColor:C.teal,borderWidth:2,pointRadius:2,tension:.3,spanGaps:true},
    {label:'Loneliness',data:cData.map(d=>d.lonely),borderColor:C.purple,borderWidth:2,pointRadius:2,tension:.3,spanGaps:true},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{min:0,max:10,ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}}}}));

  // People at camp (bar, left axis) + % alone (line, right axis)
  charts.push(new Chart(document.getElementById('ch-soc2'),{type:'bar',data:{labels:cData.map(d=>d.date),datasets:[
    {type:'bar',label:'People at camp',data:cData.map(d=>d.people),backgroundColor:C.purpleLt,borderRadius:4,yAxisID:'y',order:2},
    {type:'line',label:'% hiked alone',data:cData.map(d=>d.pctAlone),borderColor:C.gray,borderWidth:2,pointRadius:0,tension:.3,spanGaps:true,yAxisID:'y1',order:1},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},
      y:{position:'left',min:0,ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()},title:{display:true,text:'People',font:{size:10},color:tickColor()}},
      y1:{position:'right',min:0,max:100,ticks:{font:{size:10},color:tickColor(),callback:v=>v+'%'},grid:{display:false},title:{display:true,text:'% alone',font:{size:10},color:tickColor()}}
    }}}));
}

// --- Weather (Open-Meteo, free, no key) ---
const WMO_CODES={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Foggy',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  56:'Freezing drizzle',57:'Heavy freezing drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Heavy freezing rain',
  71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
  80:'Light showers',81:'Showers',82:'Heavy showers',
  85:'Light snow showers',86:'Heavy snow showers',
  95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Thunderstorm w/ heavy hail'};

function wxIcon(code,isDay){
  if(code<=1) return isDay?'☀️':'🌙';
  if(code<=3) return isDay?'⛅':'☁️';
  if(code<=48) return '🌫️';
  if(code<=57) return '🌧️';
  if(code<=67) return '🌧️';
  if(code<=77) return '❄️';
  if(code<=82) return '🌦️';
  if(code<=86) return '🌨️';
  return '⛈️';
}

function wxDayIcon(code){
  if(code<=1) return '☀️';
  if(code<=3) return '⛅';
  if(code<=48) return '🌫️';
  if(code<=57) return '🌧️';
  if(code<=67) return '🌧️';
  if(code<=77) return '❄️';
  if(code<=82) return '🌦️';
  if(code<=86) return '🌨️';
  return '⛈️';
}

function nearestLandmark(mile){
  let best=LANDMARKS[0];
  for(const lm of LANDMARKS){if(Math.abs(lm.m-mile)<Math.abs(best.m-mile))best=lm;}
  return best;
}

async function fetchTrailWeather(mile){
  const el=document.getElementById('wx-container');
  if(!el||mile<=0){if(el)el.innerHTML='';return;}

  const pos=getMilePos(mile);
  const lm=nearestLandmark(mile);
  const lat=pos.lat.toFixed(2),lng=pos.lng.toFixed(2);

  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FLos_Angeles&forecast_days=4`;
    const r=await fetch(url);
    if(!r.ok) throw new Error(r.status);
    const w=await r.json();
    const cur=w.current;
    const daily=w.daily;

    const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let forecastHtml='';
    // skip today (index 0), show next 3 days
    for(let i=1;i<Math.min(4,daily.time.length);i++){
      const d=new Date(daily.time[i]+'T12:00:00');
      const dn=dayNames[d.getDay()];
      const hi=Math.round(daily.temperature_2m_max[i]);
      const lo=Math.round(daily.temperature_2m_min[i]);
      const code=daily.weather_code[i];
      const precip=daily.precipitation_probability_max[i];
      forecastHtml+=`<div class="wx-day">
        <div class="wx-day-name">${dn}</div>
        <div class="wx-day-icon">${wxDayIcon(code)}</div>
        <div class="wx-day-temps"><span class="wx-day-hi">${hi}°</span> <span class="wx-day-lo">${lo}°</span></div>
        ${precip>10?`<div class="wx-day-precip">${precip}% rain</div>`:''}
      </div>`;
    }

    const temp=Math.round(cur.temperature_2m);
    const feels=Math.round(cur.apparent_temperature);
    const code=cur.weather_code;
    const isDay=cur.is_day;
    const wind=Math.round(cur.wind_speed_10m);
    const gusts=Math.round(cur.wind_gusts_10m);
    const humidity=Math.round(cur.relative_humidity_2m);
    const desc=WMO_CODES[code]||'';

    el.innerHTML=`<div class="wx-card">
      <div class="wx-header">
        <span class="wx-title">Trail weather now</span>
        <span class="wx-loc">Near ${escHtml(lm.l)} · mi ${fmt(mile)}</span>
      </div>
      <div class="wx-now">
        <div class="wx-icon">${wxIcon(code,isDay)}</div>
        <div>
          <div class="wx-temp">${temp}°F</div>
          <div class="wx-desc">${desc}</div>
        </div>
      </div>
      <div class="wx-details">
        <span>Feels like ${feels}°</span>
        <span>Wind ${wind} mph${gusts>wind+5?' (gusts '+gusts+')':''}</span>
        <span>Humidity ${humidity}%</span>
        ${cur.precipitation>0?`<span>Precip ${cur.precipitation}"</span>`:''}
      </div>
      <div class="wx-forecast">${forecastHtml}</div>
    </div>`;
  }catch(e){
    console.warn('Weather fetch failed',e);
    el.innerHTML='';
  }
}

loadData();
</script>
