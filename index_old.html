<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCT 2026 — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #fafaf8; --bg2: #f1efe8; --bg-card: #ffffff;
    --tx: #1a1a18; --tx2: #5f5e5a; --tx3: #888780;
    --bd: rgba(0,0,0,.1); --bd2: rgba(0,0,0,.06);
    --teal: #1D9E75; --teal-lt: #5DCAA5; --teal-bg: #E1F5EE;
    --coral: #D85A30; --coral-lt: #F0997B; --coral-bg: #FAECE7;
    --purple: #534AB7; --purple-lt: #AFA9EC; --purple-bg: #EEEDFE;
    --blue: #378ADD; --blue-lt: #85B7EB; --blue-bg: #E6F1FB;
    --amber: #BA7517; --amber-lt: #FAC775; --amber-bg: #FAEEDA;
    --pink: #D4537E; --pink-lt: #ED93B1; --pink-bg: #FBEAF0;
    --green: #639922; --green-lt: #97C459;
    --red: #E24B4A; --gray: #888780; --gray-lt: #B4B2A9;
    --radius: 10px; --radius-sm: 6px;
    --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #2c2c2a; --bg-card: #232321;
      --tx: #e8e7e2; --tx2: #b4b2a9; --tx3: #888780;
      --bd: rgba(255,255,255,.12); --bd2: rgba(255,255,255,.06);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--tx);
    line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .shell { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  .hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2px; }
  .hdr h1 { font-size: 1.35rem; font-weight: 600; letter-spacing: -.02em; }
  .sub { font-size: .72rem; color: var(--tx3); margin-bottom: 18px; }
  .btn-refresh {
    font-family: var(--font); font-size: .72rem; font-weight: 500;
    background: transparent; border: 1px solid var(--bd); border-radius: var(--radius-sm);
    color: var(--tx2); padding: 4px 12px; cursor: pointer; transition: .15s;
  }
  .btn-refresh:hover { background: var(--bg2); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 22px; }
  .tab {
    font-family: var(--font); font-size: .82rem; font-weight: 400;
    background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm);
    color: var(--tx3); padding: 5px 14px; cursor: pointer; transition: .15s;
  }
  .tab.active { background: var(--bg-card); border-color: var(--bd); color: var(--tx); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--tx2); }

  /* Metric cards */
  .metrics { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .metric {
    background: var(--bg2); border-radius: var(--radius); padding: 14px 16px;
    flex: 1 1 0; min-width: 100px;
  }
  .metric-label { font-size: .72rem; color: var(--tx3); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .metric-val { font-size: 1.4rem; font-weight: 600; line-height: 1.2; }
  .metric-sub { font-size: .68rem; color: var(--tx3); margin-top: 2px; }

  /* Progress bar */
  .prog-track { height: 8px; border-radius: 4px; background: var(--bg2); margin-bottom: 24px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; background: var(--teal); transition: width .6s; }

  /* Charts */
  .chart-wrap { position: relative; width: 100%; margin-bottom: 20px; }
  .chart-label { font-size: .82rem; font-weight: 500; color: var(--tx2); margin-bottom: 8px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: .72rem; color: var(--tx3); margin-top: 6px; margin-bottom: 16px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .leg-sq { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .leg-ln { width: 12px; height: 3px; border-radius: 1px; display: inline-block; }

  /* Map */
  .map-wrap { width: 100%; max-width: 370px; margin: 0 auto 24px; }
  .map-wrap svg { width: 100%; display: block; }

  /* Section label */
  .section { font-size: .82rem; font-weight: 500; color: var(--tx2); margin-bottom: 8px; margin-top: 20px; }

  /* Weather log + town log */
  .log-row {
    display: flex; align-items: center; gap: 10px; font-size: .8rem;
    padding: 7px 0; border-bottom: 1px solid var(--bd2);
  }
  .log-row .date { font-weight: 500; min-width: 56px; }
  .town-card {
    background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px;
  }
  .town-name { font-weight: 500; font-size: .92rem; }
  .town-mile { font-size: .72rem; color: var(--tx3); }
  .town-detail { font-size: .78rem; color: var(--tx2); margin-top: 2px; }
  .town-rest { font-size: .72rem; color: var(--tx3); margin-top: 2px; }

  /* Radar placeholder */
  .radar-wrap { position: relative; max-width: 340px; margin: 0 auto; }

  /* Average pills */
  .avg-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .avg-pill {
    background: var(--bg2); border-radius: var(--radius-sm); padding: 6px 12px;
    font-size: .78rem; display: flex; align-items: center; gap: 6px;
  }
  .avg-pill .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

  /* Loading / error */
  .center-msg { padding: 60px 20px; text-align: center; color: var(--tx3); font-size: .92rem; }
  .err { color: var(--red); }

  .hidden { display: none; }

  @keyframes pulse {
    0%, 100% { r: 8; opacity: .3; }
    50% { r: 14; opacity: .05; }
  }
  .pulse-ring { animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <h1>Pacific Crest Trail 2026</h1>
    <button class="btn-refresh" onclick="loadData()">Refresh</button>
  </div>
  <div class="sub" id="subtitle">Loading...</div>

  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<script>
const SHEET_ID = '2PACX-1vQQ7hgL-u87lGBjAHFrfvn-sUKc3tcsCGso-K7l91wTjEuORVgwBzEs-aCJPzch_8Oy1UBT6jRUis2-';
const DATA_GID = '0';
const TOWN_GID = '358115642';
const PCT_TOTAL = 2650;

const C = {
  teal:'#1D9E75',tealLt:'#5DCAA5',tealBg:'#E1F5EE',
  coral:'#D85A30',coralLt:'#F0997B',coralBg:'#FAECE7',
  purple:'#534AB7',purpleLt:'#AFA9EC',purpleBg:'#EEEDFE',
  blue:'#378ADD',blueLt:'#85B7EB',blueBg:'#E6F1FB',
  amber:'#BA7517',amberLt:'#FAC775',amberBg:'#FAEEDA',
  pink:'#D4537E',pinkLt:'#ED93B1',pinkBg:'#FBEAF0',
  green:'#639922',greenLt:'#97C459',
  red:'#E24B4A',gray:'#888780',grayLt:'#B4B2A9',
};

let mainData = [], townData = [], activeTab = 'progress', charts = [];

// PCT waypoints for the map
const WP = [
  {m:0,lat:32.59,lng:-116.47},{m:110,lat:33.24,lng:-116.57},{m:210,lat:33.52,lng:-116.68},
  {m:342,lat:34.22,lng:-117.63},{m:444,lat:34.52,lng:-118.14},{m:558,lat:34.71,lng:-118.72},
  {m:652,lat:35.38,lng:-118.48},{m:789,lat:36.45,lng:-118.34},{m:906,lat:37.24,lng:-118.92},
  {m:1017,lat:38.03,lng:-119.33},{m:1094,lat:38.64,lng:-119.90},{m:1195,lat:39.28,lng:-120.30},
  {m:1330,lat:40.23,lng:-121.53},{m:1500,lat:41.18,lng:-122.32},{m:1600,lat:41.73,lng:-122.64},
  {m:1692,lat:42.07,lng:-122.62},{m:1830,lat:42.92,lng:-122.12},{m:1970,lat:43.66,lng:-121.82},
  {m:2108,lat:44.62,lng:-121.80},{m:2150,lat:45.09,lng:-121.70},{m:2240,lat:45.63,lng:-121.82},
  {m:2395,lat:46.37,lng:-121.52},{m:2470,lat:46.77,lng:-121.18},{m:2572,lat:47.53,lng:-120.66},
  {m:2650,lat:48.99,lng:-120.73},
];
const LANDMARKS = [
  {m:0,l:'Mexico'},{m:652,l:'Kennedy Mdws'},{m:906,l:'Mammoth'},{m:1094,l:'Tahoe'},
  {m:1692,l:'OR border'},{m:2240,l:'Cascade Locks'},{m:2650,l:'Canada'},
];

// --- Utility ---
function parseCSV(text) {
  const cells = []; let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      cells.push(cur); cur = '%%NR%%';
    } else cur += ch;
  }
  cells.push(cur);
  const rows = []; let row = [];
  for (const c of cells) {
    if (c.startsWith('%%NR%%')) { if (row.length) rows.push(row); row = [c.replace('%%NR%%','')]; }
    else row.push(c);
  }
  if (row.length) rows.push(row);
  if (!rows.length) return [];
  const hdr = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1).filter(r => r.some(c => c.trim())).map(r => {
    const o = {}; hdr.forEach((h,i) => o[h] = (r[i]||'').trim()); return o;
  });
}

function n(v) { const x = parseFloat(v); return isNaN(x) ? null : x; }
function fmt(x, d=0) { return x == null ? '—' : x.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}); }
function sd(v) {
  if (!v) return ''; const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function isDark() { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
function gridColor() { return isDark() ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.07)'; }
function tickColor() { return isDark() ? '#888780' : '#888780'; }

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

function getMilePos(mile) {
  if (mile <= 0) return WP[0];
  if (mile >= PCT_TOTAL) return WP[WP.length-1];
  for (let i = 0; i < WP.length-1; i++) {
    if (mile >= WP[i].m && mile <= WP[i+1].m) {
      const t = (mile - WP[i].m) / (WP[i+1].m - WP[i].m);
      return { lat: WP[i].lat + t*(WP[i+1].lat-WP[i].lat), lng: WP[i].lng + t*(WP[i+1].lng-WP[i].lng), m: mile };
    }
  }
  return WP[0];
}

function currentMile() {
  for (let i = mainData.length-1; i >= 0; i--) { const m = n(mainData[i]['end mile marker']); if (m != null) return m; }
  return 0;
}

// --- Data Loading ---
async function loadData() {
  document.getElementById('subtitle').textContent = 'Loading...';
  document.getElementById('content').innerHTML = '';
  destroyCharts();

  const urls = [
    `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${DATA_GID}`,
    `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${TOWN_GID}`,
  ];
  const urlsFallback = [
    `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${DATA_GID}&single=true&output=csv`,
    `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${TOWN_GID}&single=true&output=csv`,
  ];

  let ok = false;
  for (const batch of [urls, urlsFallback]) {
    try {
      const [r1, r2] = await Promise.all(batch.map(u => fetch(u)));
      const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
      const p = parseCSV(t1);
      if (!p.length) throw new Error('empty');
      mainData = p; townData = parseCSV(t2); ok = true; break;
    } catch(e) { /* try next */ }
  }

  if (!ok) {
    document.getElementById('subtitle').textContent = '';
    document.getElementById('content').innerHTML = '<div class="center-msg err">Could not load data.<br>Make sure the Google Sheet is published to web<br>(File → Share → Publish to web).</div>';
    return;
  }

  const now = new Date();
  document.getElementById('subtitle').textContent =
    `Updated ${now.toLocaleTimeString()} · ${mainData.length} day${mainData.length!==1?'s':''} logged`;
  renderTabs();
  renderTab();
}

// --- Tabs ---
function renderTabs() {
  const tabs = [
    {k:'progress',l:'Progress'},{k:'bodymind',l:'Body & mind'},{k:'weather',l:'Weather'},
    {k:'towns',l:'Towns'},{k:'social',l:'Social'},
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab${t.k===activeTab?' active':''}" onclick="switchTab('${t.k}')">${t.l}</button>`
  ).join('');
}

function switchTab(k) { activeTab = k; destroyCharts(); renderTabs(); renderTab(); }

function renderTab() {
  const el = document.getElementById('content');
  el.innerHTML = '';
  destroyCharts();
  const fn = {progress:renderProgress,bodymind:renderBodyMind,weather:renderWeather,towns:renderTowns,social:renderSocial};
  fn[activeTab](el);
}

// --- Render: Progress ---
function renderProgress(el) {
  const mile = currentMile();
  const totalDays = mainData.length;
  const avg = totalDays > 0 && mile > 0 ? Math.round(mile/totalDays*10)/10 : 0;
  const rem = PCT_TOTAL - mile;
  const estDays = avg > 0 ? Math.ceil(rem/avg) : null;
  const pct = mile ? Math.round(mile/PCT_TOTAL*1000)/10 : 0;

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Current mile</div><div class="metric-val" style="color:${C.teal}">${fmt(mile)}</div><div class="metric-sub">of ${fmt(PCT_TOTAL)}</div></div>
      <div class="metric"><div class="metric-label">% complete</div><div class="metric-val" style="color:${C.purple}">${pct}%</div></div>
      <div class="metric"><div class="metric-label">Avg miles/day</div><div class="metric-val" style="color:${C.blue}">${fmt(avg,1)}</div></div>
      <div class="metric"><div class="metric-label">Est. days left</div><div class="metric-val" style="color:${C.coral}">${estDays?fmt(estDays):'—'}</div></div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="map-wrap" id="trailmap"></div>
    <div class="chart-label">Daily miles</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch-daily"></canvas></div>
    <div class="chart-label">Cumulative progress</div>
    <div class="chart-wrap" style="height:200px"><canvas id="ch-cum"></canvas></div>
  `;

  drawTrailMap(mile);

  const cData = mainData.map((d,i) => {
    const prev = i > 0 ? n(mainData[i-1]['end mile marker'])||0 : 0;
    const cur = n(d['end mile marker'])||0;
    return { date: sd(d.date), daily: Math.max(0,Math.round((cur-prev)*10)/10), cum: cur };
  }).filter(d => d.daily > 0 || d.cum > 0);

  charts.push(new Chart(document.getElementById('ch-daily'), {
    type: 'bar',
    data: { labels: cData.map(d=>d.date), datasets: [{ label:'Miles', data: cData.map(d=>d.daily), backgroundColor: C.teal, borderRadius: 4 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}} }
  }));

  charts.push(new Chart(document.getElementById('ch-cum'), {
    type: 'line',
    data: { labels: cData.map(d=>d.date), datasets: [{
      label:'Total miles', data: cData.map(d=>d.cum),
      borderColor: C.purple, backgroundColor: C.purpleBg+'80', fill:true, tension:.3, pointRadius:2
    }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},annotation:{}}, scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{min:0,max:PCT_TOTAL,ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}} }
  }));
}

function drawTrailMap(mile) {
  const W=340,H=520, mnLa=31.5,mxLa=49.5,mnLn=-124,mxLn=-115;
  const tx = ln => ((ln-mnLn)/(mxLn-mnLn))*W;
  const ty = la => H-((la-mnLa)/(mxLa-mnLa))*H;

  const trailPts = WP.map(w=>`${tx(w.lng)},${ty(w.lat)}`).join(' ');
  const cur = getMilePos(mile||0);
  const hiked = WP.filter(w=>w.m<=(mile||0)).concat(mile>0?[{lat:cur.lat,lng:cur.lng}]:[]);
  const hikedPts = hiked.map(w=>`${tx(w.lng)},${ty(w.lat)}`).join(' ');

  const dk = isDark();
  const trailStroke = dk ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.12)';
  const textFill = dk ? '#b4b2a9' : '#888780';
  const dotInactive = dk ? '#5f5e5a' : '#b4b2a9';

  let lmHtml = LANDMARKS.map(lm => {
    const p = getMilePos(lm.m);
    const x = tx(p.lng), y = ty(p.lat);
    const isH = lm.m <= (mile||0);
    return `<circle cx="${x}" cy="${y}" r="3" fill="${isH?C.teal:dotInactive}"/>
      <text x="${x+8}" y="${y+4}" font-size="10" fill="${textFill}" font-family="DM Sans,sans-serif">${lm.l}</text>`;
  }).join('');

  let curHtml = '';
  if (mile > 0) {
    const cx = tx(cur.lng), cy = ty(cur.lat);
    curHtml = `<circle cx="${cx}" cy="${cy}" r="8" fill="${C.coral}" opacity=".3" class="pulse-ring"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${C.coral}" stroke="${dk?'#232321':'white'}" stroke-width="2"/>`;
  }

  document.getElementById('trailmap').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}">
      <polyline points="${trailPts}" fill="none" stroke="${trailStroke}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      ${hikedPts ? `<polyline points="${hikedPts}" fill="none" stroke="${C.teal}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
      ${lmHtml}
      ${curHtml}
    </svg>`;
}

// --- Render: Body & Mind ---
function renderBodyMind(el) {
  const FIELDS = [
    {k:'enjoyment',l:'Enjoyment',c:C.teal},{k:'accomplishment',l:'Accomplishment',c:C.green},
    {k:'difficulty',l:'Difficulty',c:C.coral},{k:'hunger level',l:'Hunger',c:C.amber},
    {k:'injury level',l:'Injury',c:C.red},{k:'soreness',l:'Soreness',c:C.pink},
    {k:'lonelyness',l:'Loneliness',c:C.purple},{k:'natural beauty',l:'Beauty',c:C.blue},
  ];

  const cData = mainData.map(d => {
    const o = { date: sd(d.date) };
    FIELDS.forEach(f => o[f.l] = n(d[f.k]));
    return o;
  }).filter(d => FIELDS.some(f => d[f.l] != null));

  const avgs = FIELDS.map(f => {
    const v = cData.map(d=>d[f.l]).filter(x=>x!=null);
    return { ...f, avg: v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10 : 0 };
  });

  el.innerHTML = `
    <div class="section">Latest day snapshot</div>
    <div class="radar-wrap"><div class="chart-wrap" style="height:280px"><canvas id="ch-radar"></canvas></div></div>
    <div class="section">Trip averages</div>
    <div class="avg-pills">${avgs.map(a=>`<div class="avg-pill"><span class="dot" style="background:${a.c}"></span><span style="color:var(--tx2)">${a.l}:</span><span style="font-weight:500">${a.avg}</span></div>`).join('')}</div>
    <div class="chart-label">Positive trends</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-mood1"></canvas></div>
    <div class="legend">${FIELDS.slice(0,4).map(f=>`<span><span class="leg-ln" style="background:${f.c}"></span>${f.l}</span>`).join('')}</div>
    <div class="chart-label">Physical & social trends</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-mood2"></canvas></div>
    <div class="legend">${FIELDS.slice(4).map(f=>`<span><span class="leg-ln" style="background:${f.c}"></span>${f.l}</span>`).join('')}</div>
  `;

  // Radar
  const last = cData[cData.length-1];
  if (last) {
    charts.push(new Chart(document.getElementById('ch-radar'), {
      type: 'radar',
      data: {
        labels: FIELDS.map(f=>f.l),
        datasets: [{ data: FIELDS.map(f=>last[f.l]||0), borderColor:C.teal, backgroundColor:C.tealBg+'80', borderWidth:2, pointRadius:3, pointBackgroundColor:C.teal }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{r:{min:0,max:10,ticks:{stepSize:2,font:{size:9},color:tickColor(),backdropColor:'transparent'},grid:{color:gridColor()},pointLabels:{font:{size:11},color:tickColor()}}} }
    }));
  }

  // Line charts
  const makeLineChart = (canvasId, fields) => {
    charts.push(new Chart(document.getElementById(canvasId), {
      type: 'line',
      data: {
        labels: cData.map(d=>d.date),
        datasets: fields.map(f => ({ label:f.l, data:cData.map(d=>d[f.l]), borderColor:f.c, borderWidth:2, pointRadius:0, tension:.3, spanGaps:true }))
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{min:0,max:10,ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}} }
    }));
  };
  makeLineChart('ch-mood1', FIELDS.slice(0,4));
  makeLineChart('ch-mood2', FIELDS.slice(4));
}

// --- Render: Weather ---
function renderWeather(el) {
  const cData = mainData.map(d => ({
    date:sd(d.date), high:n(d['day high temp']), low:n(d['night low temp']),
    weather:d.weather||'', precip:d['overnight precipitation']||''
  })).filter(d => d.high!=null || d.low!=null);

  const logHtml = cData.slice(-14).reverse().map(d => `
    <div class="log-row">
      <span class="date">${d.date}</span>
      <span style="color:${C.coral};min-width:36px">${d.high!=null?Math.round(d.high)+'°':''}</span>
      <span style="color:${C.blue};min-width:36px">${d.low!=null?Math.round(d.low)+'°':''}</span>
      <span style="color:var(--tx2);flex:1">${d.weather}</span>
      ${d.precip?`<span style="color:${C.blue};font-size:.72rem">${d.precip}</span>`:''}
    </div>
  `).join('');

  el.innerHTML = `
    <div class="chart-label">Temperature range</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-temp"></canvas></div>
    <div class="legend"><span><span class="leg-ln" style="background:${C.coral}"></span>Day high</span><span><span class="leg-ln" style="background:${C.blue}"></span>Night low</span></div>
    <div class="section">Weather log</div>
    ${logHtml}
  `;

  charts.push(new Chart(document.getElementById('ch-temp'), {
    type: 'line',
    data: {
      labels: cData.map(d=>d.date),
      datasets: [
        { label:'Day high', data:cData.map(d=>d.high), borderColor:C.coral, backgroundColor:C.coralBg+'80', fill:true, tension:.3, pointRadius:2 },
        { label:'Night low', data:cData.map(d=>d.low), borderColor:C.blue, borderWidth:2, tension:.3, pointRadius:2, fill:false },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor(),callback:v=>v+'°'},grid:{color:gridColor()}}} }
  }));
}

// --- Render: Towns ---
function renderTowns(el) {
  if (!townData.length) { el.innerHTML = '<div class="center-msg">No town data yet</div>'; return; }

  const towns = townData.map(t => ({
    name: t['town name']||'Unknown', entered: t['date entered town'], left: t['date left town'],
    mile: n(t['left the trail at mile marker'])||n(t['left the trail at mile marker ']),
    grocery: n(t['grocery bill']), meals: n(t['# meals at restaurant']),
    restaurant: t['restruant name(s)']||t['restaurant name(s)']||'',
  }));

  const totalG = towns.reduce((s,t)=>s+(t.grocery||0),0);
  const totalM = towns.reduce((s,t)=>s+(t.meals||0),0);
  const spend = towns.filter(t=>t.grocery!=null||t.meals!=null);

  const cardsHtml = towns.map(t => {
    const details = [
      t.entered&&`In: ${sd(t.entered)}`, t.left&&`Out: ${sd(t.left)}`,
      t.grocery&&`Grocery: $${fmt(t.grocery)}`, t.meals&&`${t.meals} meal${t.meals>1?'s':''} out`
    ].filter(Boolean).join('  ·  ');
    return `<div class="town-card">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="town-name">${t.name}</span>
        ${t.mile?`<span class="town-mile">mi ${fmt(t.mile)}</span>`:''}
      </div>
      ${details?`<div class="town-detail">${details}</div>`:''}
      ${t.restaurant?`<div class="town-rest">${t.restaurant}</div>`:''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Towns visited</div><div class="metric-val" style="color:${C.purple}">${towns.length}</div></div>
      <div class="metric"><div class="metric-label">Grocery spending</div><div class="metric-val" style="color:${C.teal}">$${fmt(totalG)}</div></div>
      <div class="metric"><div class="metric-label">Restaurant meals</div><div class="metric-val" style="color:${C.coral}">${totalM}</div></div>
    </div>
    ${spend.length ? `
      <div class="chart-label">Spending by town</div>
      <div class="chart-wrap" style="height:${Math.max(160,spend.length*42+50)}px"><canvas id="ch-spend"></canvas></div>
      <div class="legend"><span><span class="leg-sq" style="background:${C.teal}"></span>Groceries</span><span><span class="leg-sq" style="background:${C.coral}"></span>Est. dining (~$15/meal)</span></div>
    ` : ''}
    <div class="section">Town log</div>
    ${cardsHtml}
  `;

  if (spend.length) {
    charts.push(new Chart(document.getElementById('ch-spend'), {
      type: 'bar',
      data: {
        labels: spend.map(t=>t.name),
        datasets: [
          { label:'Groceries', data:spend.map(t=>t.grocery||0), backgroundColor:C.teal },
          { label:'Est. dining', data:spend.map(t=>(t.meals||0)*15), backgroundColor:C.coral },
        ]
      },
      options: { responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{display:false}},
        scales:{x:{stacked:true,ticks:{font:{size:10},color:tickColor(),callback:v=>'$'+v},grid:{color:gridColor()}},y:{stacked:true,ticks:{font:{size:11},color:tickColor()},grid:{display:false}}} }
    }));
  }
}

// --- Render: Social ---
function renderSocial(el) {
  const cData = mainData.map(d => ({
    date:sd(d.date),
    people:n(d['number of people at camp']),
    social:n(d['social interaction'])||n(d['social interaction ']),
    lonely:n(d['lonelyness']),
    pctAlone:n(d['percent hiked alone']),
  })).filter(d => d.people!=null||d.social!=null||d.lonely!=null);

  const magicDays = mainData.filter(d => d['trail magic'] && d['trail magic'].toLowerCase()!=='no' && d['trail magic'].trim()!=='0' && d['trail magic'].trim()!=='').length;
  const avgPeople = (()=>{ const v=cData.map(d=>d.people).filter(x=>x!=null); return v.length?fmt(v.reduce((a,b)=>a+b,0)/v.length,1):'—'; })();

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Trail magic days</div><div class="metric-val" style="color:${C.amber}">${magicDays}</div></div>
      <div class="metric"><div class="metric-label">Avg people at camp</div><div class="metric-val" style="color:${C.purple}">${avgPeople}</div></div>
    </div>
    <div class="chart-label">People at camp & social interaction</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch-soc1"></canvas></div>
    <div class="legend"><span><span class="leg-sq" style="background:${C.purpleLt}"></span>People at camp</span><span><span class="leg-ln" style="background:${C.teal}"></span>Social level</span></div>
    <div class="chart-label">% hiked alone vs loneliness</div>
    <div class="chart-wrap" style="height:220px"><canvas id="ch-soc2"></canvas></div>
    <div class="legend"><span><span class="leg-ln" style="background:${C.gray}"></span>% alone</span><span><span class="leg-ln" style="background:${C.purple}"></span>Loneliness</span></div>
  `;

  charts.push(new Chart(document.getElementById('ch-soc1'), {
    type: 'bar',
    data: {
      labels: cData.map(d=>d.date),
      datasets: [
        { type:'bar', label:'People at camp', data:cData.map(d=>d.people), backgroundColor:C.purpleLt, borderRadius:4, order:2 },
        { type:'line', label:'Social level', data:cData.map(d=>d.social), borderColor:C.teal, borderWidth:2, pointRadius:0, tension:.3, spanGaps:true, order:1 },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}} }
  }));

  charts.push(new Chart(document.getElementById('ch-soc2'), {
    type: 'line',
    data: {
      labels: cData.map(d=>d.date),
      datasets: [
        { label:'% alone', data:cData.map(d=>d.pctAlone), borderColor:C.gray, borderWidth:2, pointRadius:0, tension:.3, spanGaps:true },
        { label:'Loneliness', data:cData.map(d=>d.lonely), borderColor:C.purple, borderWidth:2, pointRadius:0, tension:.3, spanGaps:true },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10},color:tickColor()},grid:{display:false}},y:{ticks:{font:{size:10},color:tickColor()},grid:{color:gridColor()}}} }
  }));
}

// --- Init ---
loadData();
</script>
